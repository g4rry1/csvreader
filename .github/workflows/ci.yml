name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake libcmocka-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src include tests -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake libcmocka-dev clang-tidy

      - name: Configure (with compile_commands.json)
        run: >
          cmake -B build
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DSANITIZE=OFF

      - name: Run clang-tidy
        run: |
          find src tests -name '*.c' | \
            xargs clang-tidy -p build
